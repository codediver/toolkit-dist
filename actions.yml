name: Check PR from Fork
on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code from fork
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git remote add upstream https://github.com/${{ github.repository }}.git
          git fetch upstream ${{ github.event.pull_request.base.ref }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          sha: ${{ github.event.pull_request.head.sha }}

      - name: Read changed files content
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "=== $file ==="
            cat "$file"
            echo ""
          done

name: Check PR from Fork
on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Get changed files via API
        uses: actions/github-script@v7
        with:
          script: |
            // Get list of changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            
            console.log(`Found ${files.length} changed files`);
            
            for (const file of files) {
              console.log(`\n=== ${file.filename} (${file.status}) ===`);
              
              // Skip deleted files
              if (file.status === 'removed') {
                console.log('File was deleted');
                continue;
              }
              
              try {
                // Get content from the fork's PR branch
                const { data: content } = await github.rest.repos.getContent({
                  owner: context.payload.pull_request.head.repo.owner.login,
                  repo: context.payload.pull_request.head.repo.name,
                  path: file.filename,
                  ref: context.payload.pull_request.head.sha
                });
                
                // Decode base64 content
                const fileContent = Buffer.from(content.content, 'base64').toString('utf-8');
                console.log(fileContent);
              } catch (error) {
                console.log(`Error reading file: ${error.message}`);
              }
            }

